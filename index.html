<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI;
}

body{
  background:#0f172a;
  color:#fff;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.logo{
  text-align:center;
  margin-bottom:30px;
  font-size:24px;
}

.menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  color:#cbd5e1;
  text-decoration:none;
  border-radius:8px;
  margin-bottom:8px;
}

.menu a:hover,
.menu a.active{
  background:#1e293b;
  color:#38bdf8;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
  color:#38bdf8;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.card{
  flex:1;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card i{
  font-size:30px;
  margin-bottom:10px;
}

.card h2{
  color:#38bdf8;
}

/* CONTENT */
.content{
  display:flex;
  gap:20px;
}

/* LIST */
.list{
  flex:2;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

.tabs{
  display:flex;
  margin-bottom:15px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:#111827;
  color:#fff;
  cursor:pointer;
}

.tabs button.active{
  background:#334155;
}

/* USER CARD */
.user{
  background:#334155;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.user small{
  color:#94a3b8;
}

.actions i{
  margin-left:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🏠</div>

  <div class="menu">
  <a href="index.html" class="active">Dashboard</a>
  <a href="website.html">Website</a>
  <a href="employees.html">Employees</a>
  <a href="sales.html">Sales</a>
  <a href="customers.html">Customers</a>
  <a href="calendar.html">Calendar</a>
  <a href="attendance.html">Attendance</a>
  <a href="settings.html">Settings</a>
  <a href="login.html" onclick="logout()">Sign Out</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Welcome Admin, Have a nice day</h2>
  </div>

  <!-- CARDS -->
  <div class="cards">

  <div class="card">
    <i class="ri-user-3-line"></i>
    <h2 id="empCount">0</h2>
    <p>Total Employees</p>
  </div>

  <div class="card">
    <i class="ri-group-line"></i>
    <h2 id="customerCount">0</h2>
    <p>Today Customers</p>
  </div>

  <div class="card" id="addCustomerBtn">
    <i class="ri-user-add-line"></i>
    <p>Add Customer</p>
  </div>

  <div class="card" id="addEmployeeBtn">
    <i class="ri-add-line"></i>
    <p>Add Employee</p>
  </div>

 </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- LIST -->
    <div class="list">

      <div class="tabs">
        <button class="active">Inside</button>
        <button>Outside</button>
      </div>

      <div id="userList"></div>

    </div>

</div>

<script>


// USERS
let users = JSON.parse(localStorage.getItem("users")) || [
  {name:"sudheer", type:"inside"},
  {name:"er", type:"inside"},
  {name:"rayudu", type:"outside"}
];

let currentTab = "inside";
//count function
function updateEmployeeCount(){
  document.getElementById("empCount").innerText = users.length;
}
//save funtion
function saveUsers(){
  localStorage.setItem("users", JSON.stringify(users));
}

//add employee
document.querySelectorAll(".card")[3].addEventListener("click", ()=>{
  let name = prompt("Enter employee name:");
  if(name){
    users.push({
      name:name,
      type: currentTab
    });
    saveUsers();
    renderUsers();
    updateEmployeeCount();
  }
});

//delete updata
document.querySelectorAll(".card")[3].addEventListener("click", ()=>{
  let name = prompt("Enter employee name:");
  if(name){
    users.push({
      name:name,
      type: currentTab
    });
    saveUsers();
    renderUsers();
    updateEmployeeCount();
  }
});

// RENDER USERS
function renderUsers(){
  let html="";

  users
    .filter(u => u.type === currentTab)
    .forEach((u,i)=>{
      html+=`
        <div class="user">
          <div>
            <div>Name: ${u.name}</div>
            <small>Role : ${u.type} Sales</small>
          </div>

          <div class="actions">
            <i class="ri-pencil-line" onclick="editUser(${i})"></i>
            <i class="ri-delete-bin-line" onclick="deleteUser(${i})"></i>
            <i class="ri-star-line" onclick="starUser('${u.name}')"></i>
            <i class="ri-information-line" onclick="infoUser('${u.name}')"></i>
          </div>
        </div>
      `;
    });

  document.getElementById("userList").innerHTML=html;
}

// DELETE
function deleteUser(i){
  let filtered = users.filter(u => u.type === currentTab);
  let user = filtered[i];
  users = users.filter(u => u !== user);
  saveUsers();
  renderUsers();
}

// EDIT
function editUser(i){
  let filtered = users.filter(u => u.type === currentTab);
  let user = filtered[i];

  let newName = prompt("Edit name:", user.name);
  if(newName){
    user.name = newName;
    saveUsers();
    renderUsers();
  }
}

// STAR
function starUser(name){
  alert(name + " starred ⭐");
}

// INFO
function infoUser(name){
  alert("User info: " + name);
}


// TAB SWITCH
let tabButtons = document.querySelectorAll(".tabs button");

tabButtons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    tabButtons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    currentTab = btn.innerText.toLowerCase();
    renderUsers();
  });
});

//add customers
let customers = JSON.parse(localStorage.getItem("customers")) || [];

// save function
function saveCustomers(){
  localStorage.setItem("customers", JSON.stringify(customers));
}
//count funtion
function updateCustomerCount(){
  document.getElementById("customerCount").innerText = customers.length;
}
//add customer card clik
document.querySelectorAll(".card")[1].addEventListener("click", ()=>{
  let name = prompt("Enter customer name:");

  if(name){
    customers.push({
      name:name,
      date: new Date().toDateString()
    });

    saveCustomers();
    updateCustomerCount();
  }
});

//customer button
document.getElementById("addCustomerBtn").addEventListener("click", ()=>{
  let name = prompt("Enter customer name:");
  if(name){
    customers.push({
      name:name,
      date: new Date().toDateString()
    });
    saveCustomers();
    updateCustomerCount();
  }
});

//initial load
updateCustomerCount();

// SIDEBAR ACTIVE MENU
document.querySelectorAll(".menu a").forEach(link=>{
  link.addEventListener("click", ()=>{
    document.querySelectorAll(".menu a").forEach(l=>l.classList.remove("active"));
    link.classList.add("active");
  });
});

// INITIAL LOAD
renderUsers();

</script>

</body>
</html>
